<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Electricity Shop</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f3f3;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #ccc;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 15px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 12px;
      vertical-align: top;
    }
    th {
      background: #e8e8e8;
      text-align: center;
      font-size: 1.1em;
    }
    .shop-image {
      width: 100%;
      display: block;
      max-width: 280px;
      height: auto;
      border-radius: 4px;
    }
    .video-wrapper {
      text-align: center;
      padding: 10px;
    }
    video {
      width: 100%;
      max-width: 820px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .buttons {
      text-align: center;
      margin-top: 10px;
    }
    .buttons button {
      margin: 5px;
      padding: 10px 16px;
      border: none;
      background: #0073e6;
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .buttons button:hover {
      background: #005bb5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Electricity Shop</h1>
    <table>
      <tr>
        <th>Featured Item</th>
        <th>Electric Items List (Sample)</th>
        <th>Shop Image</th>
      </tr>
      <tr>
        <td rowspan="2">
          <strong>LED Bulb 12W</strong><br>
          Rs. 850<br>
          Energy Saving
        </td>
        <td>
          <ul>
            <li>LED Bulb 12W</li>
            <li>Extension Cord 5m</li>
            <li>MCB Switch</li>
            <li>Ceiling Fan</li>
          </ul>
        </td>
        <td>
          <img class="shop-image" src="C:\Users\MY PC\Downloads\download (2).jpeg" alt="Electric Shop Image">
        </td>
      </tr>
      <tr>
        <td colspan="2" class="video-wrapper">
          <strong>Demo Video (Electric Products / Installation)</strong><br>
          <video controls>
            <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" type="video/mp4">
            Your browser does not support the video tag.
          </video>
        </td>
      </tr>
    </table>
    <div class="buttons">
      <button onclick="showWelcome()">Button 1 - Show Message</button>
      <button onclick="collectDetails()">Button 2 - Enter Details</button>
      <button onclick="calculateService()">Button 3 - Calculate</button>
    </div>
  </div>
  <script>
    function showWelcome() {
      alert('Welcome to the Electricity Shop!');
    }
    function collectDetails() {
      const customer = prompt('Enter your name:');
      const item = prompt('Enter item name:');
      const quantity = prompt('Enter quantity:');
      if (customer && item && quantity) {
        alert('Customer: ' + customer + '\nItem: ' + item + '\nQuantity: ' + quantity);
      } else {
        alert('Please enter all details.');
      }
    }
    function calculateService() {
      const days = prompt('Enter number of service days:');
      const rate = 5000;
      const numberOfDays = parseInt(days, 10);
      if (!isNaN(numberOfDays) && numberOfDays > 0) {
        const total = numberOfDays * rate;
        alert('Service days: ' + numberOfDays + '\nTotal cost: Rs. ' + total);
      } else {
        alert('Enter a valid number of days.');
      }
    }
  </script>
</body>
</html>

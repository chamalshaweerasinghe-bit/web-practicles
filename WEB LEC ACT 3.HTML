
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Activity Page</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <h1>Student Activity Page</h1>

    <main class="content">
        <section class="panel media-panel">
            <h2>Media Table</h2>

            <table class="media-table">
                <thead>
                    <tr>
                        <th colspan="2">Student Learning Materials</th>
                        <th>Type</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="list-cell" rowspan="2">
                            <ul>
                                <li>HTML</li>
                                <li>CSS</li>
                                <li>Forms</li>
                            </ul>
                        </td>
                        <td class="media-cell">
                            <img
                                src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=500&q=80"
                                alt="Student learning activity"
                            >
                        </td>
                        <td class="type-cell">Image</td>
                    </tr>
                    <tr>
                        <td class="media-cell">
                            <video controls poster="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=640&q=80">
                                <source src="student-activity.mp4" type="video/mp4">
                                Your browser does not support the video tag.
                            </video>
                        </td>
                        <td class="type-cell">Video</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <section class="panel form-panel">
            <h2>Student Form</h2>

            <form>
                <label for="full-name">Full Name:</label>
                <input type="text" id="full-name" name="full-name">

                <label for="email">Email:</label>
                <input type="email" id="email" name="email">

                <label for="course">Course:</label>
                <select id="course" name="course">
                    <option>Web Development</option>
                    <option>Graphic Design</option>
                    <option>Data Science</option>
                    <option>Cyber Security</option>
                </select>

                <label for="message">Message:</label>
                <textarea id="message" name="message"></textarea>

                <button type="submit">Submit</button>
            </form>
        </section>
    </main>
</body>
</html>
